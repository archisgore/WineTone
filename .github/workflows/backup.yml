name: backup-labels

# Daily snapshot of user-contributed data to a private GitHub repo
# (archisgore/winetone-labels-backup).
#
# v2 (2026-05-30) — destination flipped from HF Dataset to a private
# GitHub repo. Backup contents are GDPR-pseudonymized: every row is
# keyed by `masked_user_id` only; the `users` table is excluded
# entirely. See scripts/backup_labels.py for the full rationale.
#
# Required repo secrets (in the `production` environment):
#   - WINETONE_DB_URL    — Neon connection
#   - BACKUP_REPO_TOKEN  — fine-grained PAT with Contents:Write on
#                          archisgore/winetone-labels-backup. Create
#                          at https://github.com/settings/tokens (or
#                          better: a fine-grained token scoped only
#                          to the backup repo).

on:
  schedule:
    - cron: '0 3 * * *'    # daily, 03:00 UTC
  workflow_dispatch: {}     # manual trigger

jobs:
  snapshot:
    name: Snapshot user labels to GitHub
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    permissions:
      contents: read    # this repo (read-only)

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Checkout backup repo
        uses: actions/checkout@v4
        with:
          repository: archisgore/winetone-labels-backup
          token: ${{ secrets.BACKUP_REPO_TOKEN }}
          path: backup-repo

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install minimal deps
        run: |
          python -m pip install -U pip
          pip install \
            "pandas>=2.2" "pyarrow>=16" "sqlalchemy>=2.0" \
            "psycopg[binary]>=3.2" "tenacity>=8.4"

      - name: Snapshot into backup-repo
        env:
          WINETONE_DB_URL: ${{ secrets.WINETONE_DB_URL }}
        run: |
          PYTHONPATH=src python scripts/backup_labels.py \
            --target backup-repo --apply

      - name: Commit + push
        working-directory: backup-repo
        env:
          # The action above already set up the credential for this
          # remote — no extra git config needed for auth.
          TZ: UTC
        run: |
          git config user.name  "WineTone Backup Bot"
          git config user.email "winetone-backup@users.noreply.github.com"
          git add -A
          # `git diff --staged --quiet` exits 0 iff nothing changed.
          # No new data → no commit, no noise.
          if git diff --staged --quiet; then
            echo "No changes since last snapshot — skipping commit."
            exit 0
          fi
          git commit -m "snapshot $(date -u +%Y-%m-%d-%H%M)"
          git push
