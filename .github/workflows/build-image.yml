name: build-image

# Build the WineTone container image and publish it to GitHub Container
# Registry. The HF Spaces don't currently consume this image — they
# build directly from this source repo via their own Dockerfile + the
# private HF dataset archisgore/winetone-data. The GHCR pipeline is
# kept here for future activation (e.g., if we ever want
# FROM ghcr.io/... in the Space Dockerfile to skip per-deploy rebuilds).
#
# Triggers:
#   - push to `main`  → :latest + :main-<sha>
#   - workflow_dispatch (manual; runs on whichever branch you trigger from)
#
# Data sources:
#   - source code  → this repo (public)
#   - sparse joblibs → archisgore/winetone-data (private HF dataset),
#                      fetched via HF_TOKEN_WRITE at build time
#
# v2 (2026-05-29) — switched data fetch from "GH release asset by ID"
# to `huggingface_hub.snapshot_download` of the private HF dataset.
# No more GH release tag concept; the HF dataset always reflects the
# current canonical data snapshot.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/winetone

jobs:
  build:
    runs-on: ubuntu-latest
    # Scope HF_TOKEN_WRITE to the same `production` environment used by
    # retrain.yml and backup.yml — restricts the secret to runs from
    # the protected main branch.
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Pull sparse joblibs from private HF dataset
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN_WRITE }}
        run: |
          python -m pip install -q --upgrade pip
          pip install -q "huggingface_hub>=0.24"
          python <<'PY'
          import os
          from huggingface_hub import snapshot_download
          snapshot_download(
              repo_id="archisgore/winetone-data",
              repo_type="dataset",
              local_dir="data/canonical",
              token=os.environ["HF_TOKEN"],
          )
          PY
          echo "Sparse joblibs in build context:"
          ls -lh data/canonical/sparse/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          short_sha="${GITHUB_SHA:0:7}"
          tags="${REGISTRY}/${IMAGE_NAME}:latest,${REGISTRY}/${IMAGE_NAME}:main-${short_sha}"
          echo "tags=$tags" >> "$GITHUB_OUTPUT"
          echo "Will push: $tags"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}
            org.opencontainers.image.title=WineTone
            org.opencontainers.image.description=Pantone for wine — calibrated to your vocabulary

      - name: Summary
        run: |
          {
            echo "### Pushed to GHCR"
            echo ""
            echo "Image: \`${REGISTRY}/${IMAGE_NAME}\`"
            echo "Tags:"
            for t in $(echo "${{ steps.tags.outputs.tags }}" | tr ',' ' '); do
              echo "- \`$t\`"
            done
            echo ""
            echo "Data source: \`archisgore/winetone-data\` (private HF dataset)"
          } >> "$GITHUB_STEP_SUMMARY"
