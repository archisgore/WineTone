name: e2e

# End-to-end smoke tests against a live deploy. Two main triggers:
#
#   - workflow_dispatch — manual run from the Actions tab. Pick which
#     environment via the `target` input. Useful for ad-hoc verification.
#   - schedule          — nightly run against prod. Catches anything
#                          that drifts between deploys (HF Inference
#                          rate-limits changing, Neon connection-string
#                          rotations, third-party CDN outages).
#   - push to `stage`   — auto-runs against staging.tone.wine after every
#                          push, acting as a quality gate before promoting
#                          stage→main.
#
# Anonymous coverage runs everywhere. Authenticated tests run only
# when the workflow runs against staging AND the E2E_STAGING_AUTH_STATE
# secret is present (a captured Clerk session JSON, staging-only); the
# fixtures self-skip otherwise. See docs/runbooks/e2e-testing.md.

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Environment to test against'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - prod
  schedule:
    # 06:00 UTC every day (≈ 23:00 PT). Always against prod.
    - cron: '0 6 * * *'
  push:
    branches: [stage]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set base URL
        id: target
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "url=https://tone.wine" >> "$GITHUB_OUTPUT"
            echo "env_name=prod" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "url=https://staging.tone.wine" >> "$GITHUB_OUTPUT"
            echo "env_name=staging" >> "$GITHUB_OUTPUT"
          else
            if [ "${{ inputs.target }}" = "prod" ]; then
              echo "url=https://tone.wine" >> "$GITHUB_OUTPUT"
              echo "env_name=prod" >> "$GITHUB_OUTPUT"
            else
              echo "url=https://staging.tone.wine" >> "$GITHUB_OUTPUT"
              echo "env_name=staging" >> "$GITHUB_OUTPUT"
            fi
          fi
          echo "Selected target: ${{ steps.target.outputs.env_name }}"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install e2e dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-playwright httpx
          playwright install --with-deps chromium

      - name: Run e2e suite against ${{ steps.target.outputs.env_name }}
        env:
          WINETONE_E2E_URL: ${{ steps.target.outputs.url }}
          # Captured Clerk session JSON for authenticated tests. Only
          # valid against staging (dev Clerk instance), so the fixture
          # auto-skips when target=prod. When the secret is unset (e.g.
          # a fork without access to repo secrets) the authenticated
          # tests skip and anonymous coverage stays green.
          E2E_STAGING_AUTH_STATE: ${{ secrets.E2E_STAGING_AUTH_STATE }}
        run: |
          pytest tests/e2e -v --tb=short

      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace-${{ steps.target.outputs.env_name }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7
