{% extends "base.html" %}
{% block title %}{{ title }} — WineTone{% endblock %}
{% block content %}
<section class="container error-page">
  <h1 class="error-code">{{ code }}</h1>
  <h2 class="error-title">{{ title }}</h2>
  <p class="error-message">{{ message }}</p>
  <p class="error-cta">
    <a href="/">← Back to the landing page</a>
    {% if code != "404" %}
      &nbsp;·&nbsp;
      <a href="mailto:me@archisgore.com?subject=WineTone%20error%20{{ code }}">Report this by email</a>
    {% endif %}
  </p>
</section>
{% endblock %}
